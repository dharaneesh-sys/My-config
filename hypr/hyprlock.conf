# hour
label {
    monitor =
    text = cmd[update:1000:true] echo "<span font_family='SF Pro Display' font_weight='700'>$(date +'%I:%M')</span>"
    color = rgba(ffb3b0ff)
    font_size = 150
    position = 0, 120
    halign = center
    valign = center
}

