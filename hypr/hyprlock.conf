# date
label {
    monitor =
    text = cmd[update:60000:true] echo "<span font_family='SF Pro Display' font_weight='400'>$(date +'%A, %B %d')</span>"
    color = rgba(c2c7ceff)
    font_size = 18
    position = 0, 20
    halign = center
    valign = center
}

# input field
input-field {
    monitor =
    size = 13%, 4%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = rgba(1a1111ff) rgba(904a48ff) 45deg
    check_color = rgba(f0deddff) rgba(733332ff) 120deg
    fail_color = rgba(ffb4abff)
    font_color = rgba(e7bdbaff)
    fade_on_empty = true
    placeholder_text = Password Please :)
    rounding = 35
    show_on_input = true
    position = 0, -40
    halign = center
    valign = center
}

animations {
    enabled = true
    bezier = myBezier, 0.42, 0, 1, 1
    animation = fadeIn, 1, 1.5, myBezier
    animation = fadeOut, 1, 1.5, myBezier
    animation = inputFieldFade, 1, 1.5, myBezier
}   
